openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: news
    description: Live news operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: Get current top news headlines
      description: Fetches and categorizes live top headlines from NewsAPI
      parameters:
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Live news articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"
        "500":
          description: Failed to fetch news
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    NewsArticle:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        categoryColor:
          type: string
        headline:
          type: string
        summary:
          type: string
        detail:
          type: string
        source:
          type: string
        url:
          type: string
        publishedAt:
          type: string
        significance:
          type: string
          enum: [critical, high, medium]
        tags:
          type: array
          items:
            type: string
        readTime:
          type: integer
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - category
        - categoryColor
        - headline
        - summary
        - detail
        - source
        - url
        - publishedAt
        - significance
        - tags
        - readTime
    NewsResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        totalResults:
          type: integer
        fetchedAt:
          type: string
      required:
        - articles
        - totalResults
        - fetchedAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
